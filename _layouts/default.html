<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
{%- include head.html -%}
<body class="min-h-screen bg-paper dark:bg-paper-dark text-ink dark:text-ink-dark font-sans antialiased">
  <div class="mx-auto flex min-h-screen max-w-2xl flex-col px-6">

    <header class="flex items-center justify-between gap-4 py-8">
      <a href="{{ "/" | relative_url }}"
         class="text-sm font-semibold tracking-tight hover:text-amber-600 dark:hover:text-amber-400">
        {{ site.author }}
      </a>
      <nav class="flex items-center gap-5 text-sm text-stone-500 dark:text-stone-400">
        <a href="{{ "/" | relative_url }}" class="hover:text-amber-600 dark:hover:text-amber-400">Writing</a>
        <a href="{{ "/testimonials.html" | relative_url }}" class="hover:text-amber-600 dark:hover:text-amber-400">Testimonials</a>
        <a href="{{ "/uses/" | relative_url }}" class="hover:text-amber-600 dark:hover:text-amber-400">Uses</a>
        <a href="{{ "/about.html" | relative_url }}" class="hover:text-amber-600 dark:hover:text-amber-400">About</a>
        <button id="theme-toggle" type="button" aria-label="Toggle light and dark theme"
          class="grid size-8 place-items-center rounded-md border border-stone-300 dark:border-stone-600 text-stone-500 dark:text-stone-400 transition-colors hover:text-amber-600 hover:border-amber-500 dark:hover:text-amber-400 dark:hover:border-amber-500">
          <svg class="size-4 dark:hidden" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
          </svg>
          <svg class="size-4 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
          </svg>
        </button>
      </nav>
    </header>

    <main class="flex-1 pb-16">
      {{ content }}
    </main>

    {%- include footer.html -%}
  </div>

  {%- if jekyll.environment == 'production' -%}
  {%- include analytics.html -%}
  {%- endif -%}

  <script>
    (function () {
      var root = document.documentElement;
      var btn = document.getElementById("theme-toggle");
      if (btn) {
        btn.addEventListener("click", function () {
          var isDark = root.classList.toggle("dark");
          try { localStorage.setItem("theme", isDark ? "dark" : "light"); } catch (e) {}
        });
      }
      // Follow the OS setting until the visitor makes an explicit choice.
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function (e) {
        try { if (!localStorage.getItem("theme")) root.classList.toggle("dark", e.matches); } catch (err) {}
      });
    })();
  </script>
</body>
</html>
