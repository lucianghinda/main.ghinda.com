name: Deploy site to GitHub Pages

# This site can't use GitHub's built-in Jekyll builder: it compiles Tailwind
# through the jekyll-tailwind plugin, which the native builder won't run. So we
# build with our own Gemfile here and publish the result as a Pages artifact.
#
# One-time setup in the repo: Settings > Pages > Build and deployment >
# Source = "GitHub Actions".

on:
  # Rebuild and deploy on every push to the default branch.
  push:
    branches: [main]
  # Refresh the aggregated homepage feed on a schedule so posts published on
  # notes.ghinda.com and allaboutcoding.ghinda.com appear without a push. Cron
  # is UTC; every 3 hours. (GitHub pauses schedules after 60 days of no repo
  # activity — a push or a manual run re-enables them.)
  schedule:
    - cron: "0 */3 * * *"
  # Allow manual runs from the Actions tab (use this to force an instant refresh).
  workflow_dispatch:

# Least privilege for the job, plus what the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-flight one finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Local dev uses Ruby 4.0.1 (.ruby-version, which is gitignored), but
          # 3.4 is reliably available on runners and the Gemfile supports it.
          # Bump this if the build ever needs a newer Ruby.
          ruby-version: "3.4"
          bundler-cache: true

      - name: Refresh external feeds
        # Pulls the latest posts from notes.ghinda.com and allaboutcoding into
        # _data/external_posts.yml so the homepage "Recent writing" stream is
        # current at build time. On a feed failure it falls back to the copy
        # committed in the repo, so the build never breaks (see bin/fetch_feeds).
        run: bundle exec bin/fetch_feeds

      - name: Build with Jekyll
        # Compiles Tailwind and writes _site. Production env turns on analytics.
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
